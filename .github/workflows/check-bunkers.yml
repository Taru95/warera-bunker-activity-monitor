name: Check bunker transitions

on:
  schedule:
    - cron: "0 */2 * * *"   # every 2 hours
  workflow_dispatch:

permissions:
  contents: write           # to commit state.json back

jobs:
  check:
    runs-on: ubuntu-latest
    concurrency:
      group: bunker-bot
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run bunker check
        env:
          DISCORD_BUNKER_WEBHOOK_URL: ${{ secrets.DISCORD_BUNKER_WEBHOOK_URL }}
        run: python alert.py
      - name: Commit updated state.json
        run: |
          git config user.name "bunker-bot"
          git config user.email "bunker-bot@users.noreply.github.com"
          if [[ -n "$(git status --porcelain state.json)" ]]; then
            git add state.json
            git commit -m "Update bunker state ($(date -u +%FT%TZ))"
            git push
          else
            echo "no state changes"
          fi